schema_version: "1.0"
work:
  title: "雨夜校准"
  original_author: "Zen Story2Script 示例原创文本"
  language: "zh-CN"
  source_chapters:
    count: 3
    range: "第一章-第三章"
adaptation:
  target_format: "short_drama"
  target_duration: "12-15min"
  genre: "mystery"
  tone: "restrained"
  logline: "一名修表师回到父亲留下的旧铺，在慢了十三分钟的钟声里追出十年前的车站真相。"
  principles:
    - "保留十三分钟误差作为核心悬念。"
    - "把人物内心变化外化为找线索、拆钟和面对证人的行动。"
    - "压缩支线人物，集中在林澈、沈雁和陈叔三方对峙。"
characters:
  - id: "char_001"
    name: "林澈"
    role: "protagonist"
    identity: "离乡多年的修表师之子"
    personality: "克制、敏感、习惯用理性遮住情绪"
    goal: "弄清父亲死亡前留下的十三分钟提示。"
    arc: "从逃避家族旧事到主动公开真相。"
    relationships:
      - target: "沈雁"
        relation: "旧友与调查搭档"
      - target: "陈叔"
        relation: "父亲旧案的关键证人"
  - id: "char_002"
    name: "沈雁"
    role: "supporting"
    identity: "南桥镇档案馆管理员"
    personality: "冷静、直接、重视证据"
    goal: "帮助林澈拼合十年前的事故记录。"
    arc: "从旁观旧案到推动真相公开。"
    relationships:
      - target: "林澈"
        relation: "少年旧友"
  - id: "char_003"
    name: "陈叔"
    role: "antagonistic_witness"
    identity: "旅店老板，前车站调度员"
    personality: "沉默、愧疚、长期自我辩解"
    goal: "隐藏自己当年改动信号时间的责任。"
    arc: "从沉默逃避到承认真相。"
    relationships:
      - target: "林澈父亲"
        relation: "被追问多年的旧案关联人"
plot_outline:
  - source_chapter: "第一章"
    key_events:
      - "林澈回到父亲留下的旧钟表铺。"
      - "他发现便签提示不要校准慢了十三分钟的钟。"
      - "匿名人送来十年前的旧车票。"
    adaptation_choice: "将返乡、遗言和神秘信封合并为开场悬念。"
  - source_chapter: "第二章"
    key_events:
      - "林澈向沈雁求助，查到十年前车站事故。"
      - "两人在长摆钟内找到父亲录音。"
      - "录音指向另一座停在十一点十三分的钟。"
    adaptation_choice: "用档案和录音推动信息揭示，减少解释性旁白。"
  - source_chapter: "第三章"
    key_events:
      - "地下室旧钟暗格中藏有信号室钥匙和维修记录。"
      - "林澈与沈雁在废弃信号室找到陈叔。"
      - "陈叔承认十年前人为造成列车晚点十三分钟。"
      - "林澈保留慢钟，把误差变成公开证词。"
    adaptation_choice: "把结尾集中到信号室对峙和钟声公开两个画面。"
scenes:
  - scene_id: "S001"
    scene_type: "INT"
    location: "旧钟表铺"
    time_of_day: "NIGHT"
    characters:
      - "林澈"
    summary: "林澈在雨夜回到父亲的钟表铺，发现不要校准慢钟的便签。"
    dramatic_purpose: "建立十三分钟误差的核心悬念。"
    beats:
      - type: "action"
        content: "林澈推开铺门，灰尘在灯光里浮起，长摆钟独自走动。"
      - type: "action"
        content: "他在工作台上发现父亲留下的便签。"
      - type: "dialogue"
        speaker: "林澈"
        content: "慢了十三分钟，为什么不能调回来？"
      - type: "transition"
        content: "铺外雨声压过钟声，一个信封从门缝滑入。"
  - scene_id: "S002"
    scene_type: "INT"
    location: "南桥镇档案馆"
    time_of_day: "MORNING"
    characters:
      - "林澈"
      - "沈雁"
    summary: "沈雁调出十年前车站事故记录，失踪者周铭与林澈父亲有关。"
    dramatic_purpose: "把私人遗物悬念连接到公共事故。"
    beats:
      - type: "action"
        content: "沈雁把事故登记表推到林澈面前。"
      - type: "dialogue"
        speaker: "沈雁"
        content: "这趟车晚点十三分钟，你父亲报过案，后来又撤了。"
      - type: "dialogue"
        speaker: "林澈"
        content: "周铭是谁？"
      - type: "parenthetical"
        content: "沈雁没有立刻回答，只看向窗外的旧铁路桥。"
  - scene_id: "S003"
    scene_type: "INT"
    location: "旧钟表铺"
    time_of_day: "DAY"
    characters:
      - "林澈"
      - "沈雁"
      - "林澈父亲的录音"
    summary: "两人拆开长摆钟，找到父亲留下的磁带。"
    dramatic_purpose: "揭示父亲参与掩护幸存者，并留下继续追查的线索。"
    beats:
      - type: "action"
        content: "林澈卸下钟壳背板，从暗处取出油纸包着的磁带。"
      - type: "dialogue"
        speaker: "林澈父亲的录音"
        content: "周铭不是失踪，他被我藏了起来。"
      - type: "dialogue"
        speaker: "林澈父亲的录音"
        content: "有人改了车站信号，想让整列车晚到十三分钟。"
      - type: "transition"
        content: "录音里的十三下钟声与铺里的长摆钟重叠。"
  - scene_id: "S004"
    scene_type: "INT"
    location: "档案馆地下室"
    time_of_day: "DUSK"
    characters:
      - "林澈"
      - "沈雁"
    summary: "地下室旧钟暗格中藏着信号室钥匙和维修记录。"
    dramatic_purpose: "给出通向真相现场的物证。"
    beats:
      - type: "action"
        content: "锈锁被打开，旧钟停在十一点十三分。"
      - type: "action"
        content: "林澈从暗格里取出信号室钥匙和维修记录。"
      - type: "dialogue"
        speaker: "沈雁"
        content: "旧信号室在桥边，改造后就废弃了。"
      - type: "transition"
        content: "两人冲出地下室，雨再次落下。"
  - scene_id: "S005"
    scene_type: "INT/EXT"
    location: "废弃信号室"
    time_of_day: "NIGHT"
    characters:
      - "林澈"
      - "沈雁"
      - "陈叔"
    summary: "陈叔承认十年前收钱改动信号时间，造成列车晚点十三分钟。"
    dramatic_purpose: "完成真相揭示和主角选择。"
    beats:
      - type: "action"
        content: "手电照亮陈叔的背影，桌上放着一只慢了十三分钟的怀表。"
      - type: "dialogue"
        speaker: "陈叔"
        content: "我只是让车晚一点，没人告诉我会有人死。"
      - type: "dialogue"
        speaker: "林澈"
        content: "所以我父亲留下的不是谜语，是证词。"
      - type: "action"
        content: "天亮后，林澈把长摆钟搬到铺门口，没有拨动指针。"
      - type: "transition"
        content: "第一声钟响穿过清晨的南桥镇。"
notes:
  adaptation_summary: "三章小说被压缩为五场短剧：旧铺开场、档案馆查证、钟内录音、地下室取证、信号室对峙与公开钟声。"
  omitted_elements:
    - "林澈与父亲长期疏离的更多童年回忆。"
    - "周铭被藏起后的详细去向。"
  risks:
    - "陈叔收钱动机仍需在长版本中补强。"
    - "周铭线索可在后续版本中增加回访或证言。"
  next_steps:
    - "补写陈叔与林澈父亲十年前的直接冲突闪回。"
    - "为最终公开真相增加法律或媒体后续。"
