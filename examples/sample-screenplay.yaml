schema_version: "1.0"
work:
  title: "雾镇来信"
  original_author: "Zen Story2Script 示例原创文本"
  language: "zh-CN"
  source_chapters:
    count: 3
    range: "第一章至第三章"
adaptation:
  target_format: "short_drama"
  target_duration: "10-15min"
  genre: "悬疑"
  tone: "现实主义、节奏紧凑、冷峻克制"
  logline: "一段来自旧事件的来信，把返乡修表师推回十年前的车站事故。"
  principles:
    - "把小说内心独白外化为动作、沉默和对白。"
    - "保留旧钟慢十三分钟作为核心悬念。"
    - "每场都给演员明确的行动目标和冲突对象。"
characters:
  - id: "char_001"
    name: "林澈"
    role: "protagonist"
    identity: "离乡多年的修表师之子"
    personality: "克制、敏感、习惯用理性压住情绪"
    goal: "弄清父亲留下旧钟误差的真正原因。"
    arc: "从逃避家族旧事到主动公开真相。"
    relationships:
      - target: "沈雁"
        relation: "旧友与调查搭档"
      - target: "陈叔"
        relation: "父亲旧案的关键证人"
  - id: "char_002"
    name: "沈雁"
    role: "supporting"
    identity: "雾镇档案馆管理员"
    personality: "冷静、直接、重视证据"
    goal: "帮助林澈拼合十年前的事故记录。"
    arc: "从旁观旧案到推动真相公开。"
    relationships:
      - target: "林澈"
        relation: "少年旧友"
  - id: "char_003"
    name: "陈叔"
    role: "antagonistic_witness"
    identity: "旅店老板，前车站调度员"
    personality: "沉默、愧疚、长期自我辩解"
    goal: "隐藏自己当年改动信号时间的责任。"
    arc: "从逃避追问到承认真相。"
    relationships:
      - target: "林澈父亲"
        relation: "被追问多年的旧案关联人"
plot_outline:
  - source_chapter: "第一章 误差"
    key_events:
      - "林澈回到父亲留下的旧钟表铺。"
      - "他发现便签提示不要校准慢了十三分钟的钟。"
      - "匿名来信附上十年前的旧车票。"
    adaptation_choice: "合并返乡、遗言和神秘来信，作为开场悬念。"
  - source_chapter: "第二章 回声"
    key_events:
      - "林澈向沈雁求助，查到十年前车站事故记录。"
      - "两人在旧钟里找到父亲录音。"
      - "录音指向被人为拖慢的信号时间。"
    adaptation_choice: "用档案和录音推动信息揭示，减少解释性旁白。"
  - source_chapter: "第三章 校准"
    key_events:
      - "林澈和沈雁在废弃信号室找到陈叔。"
      - "陈叔承认当年收钱改动信号时间。"
      - "林澈决定保留旧钟误差，把它变成公开证词。"
    adaptation_choice: "把结尾集中到信号室对峙和钟声公开两个画面。"
scenes:
  - scene_id: "S001"
    scene_type: "INT"
    location: "旧钟表铺"
    time_of_day: "NIGHT"
    characters:
      - "林澈"
    summary: "林澈雨夜回到父亲的钟表铺，发现不要校准旧钟的便签。"
    dramatic_purpose: "建立十三分钟误差的核心悬念。"
    beats:
      - type: "action"
        content: "林澈推开铺门，灰尘在灯光里浮起，墙上的长摆钟比手机时间慢十三分钟。"
      - type: "action"
        content: "他戴上放大镜，拆开钟壳，从齿轮旁夹出一张油污便签。"
      - type: "dialogue"
        speaker: "林澈"
        content: "爸，钟坏了就该修。你为什么偏要它错着？"
      - type: "parenthetical"
        content: "门缝里滑进一只湿信封，林澈没有立刻去捡。"
      - type: "action"
        content: "他拾起信封，里面是一张十年前的车票，时间同样停在十一点十三分。"
      - type: "transition"
        content: "雨声压过钟声。"
  - scene_id: "S002"
    scene_type: "INT"
    location: "雾镇档案馆"
    time_of_day: "MORNING"
    characters:
      - "林澈"
      - "沈雁"
    summary: "沈雁调出车站事故记录，林澈发现父亲曾撤回报案。"
    dramatic_purpose: "把私人遗物连接到公共事故。"
    beats:
      - type: "action"
        content: "沈雁把事故登记表推到林澈面前，用手指压住报案人一栏。"
      - type: "dialogue"
        speaker: "沈雁"
        content: "这趟车晚点十三分钟。你父亲报过案，后来又撤了。"
      - type: "dialogue"
        speaker: "林澈"
        content: "撤案的人不一定心虚，也可能是怕别人死。"
      - type: "parenthetical"
        content: "沈雁看着他，等他自己听见这句话里的漏洞。"
      - type: "dialogue"
        speaker: "沈雁"
        content: "那就找出他怕的是谁。"
      - type: "action"
        content: "她抽出一张旧照片，车站调度室门口站着年轻时的陈叔。"
  - scene_id: "S003"
    scene_type: "INT"
    location: "旧钟表铺"
    time_of_day: "DAY"
    characters:
      - "林澈"
      - "沈雁"
      - "林澈父亲的录音"
    summary: "两人拆开长摆钟，找到父亲留下的磁带录音。"
    dramatic_purpose: "让父亲从缺席人物变成推动真相的声音。"
    beats:
      - type: "action"
        content: "林澈卸下长摆钟背板，沈雁用手电照进暗格。"
      - type: "dialogue"
        speaker: "沈雁"
        content: "你父亲不是在藏钟，他是在藏证据。"
      - type: "action"
        content: "林澈取出油纸包，里面是一盘磁带和一枚信号室钥匙。"
      - type: "dialogue"
        speaker: "林澈父亲的录音"
        content: "周铭不是失踪，他被我藏起来了。有人改了信号，想让整列车晚到十三分钟。"
      - type: "dialogue"
        speaker: "林澈"
        content: "陈叔知道钥匙能开哪扇门。"
      - type: "transition"
        content: "磁带里的钟声与墙上的长摆钟重叠。"
  - scene_id: "S004"
    scene_type: "INT/EXT"
    location: "废弃信号室"
    time_of_day: "NIGHT"
    characters:
      - "林澈"
      - "沈雁"
      - "陈叔"
    summary: "陈叔承认当年收钱改动信号时间，造成列车晚点十三分钟。"
    dramatic_purpose: "完成真相揭示和主角选择。"
    beats:
      - type: "action"
        content: "手电照亮陈叔的背影，桌上放着一只慢了十三分钟的怀表。"
      - type: "dialogue"
        speaker: "陈叔"
        content: "我只是让车晚一点。没人告诉我，会有人死。"
      - type: "dialogue"
        speaker: "林澈"
        content: "所以我父亲留下的不是谜语，是证词。"
      - type: "action"
        content: "沈雁打开录音笔，红灯在黑暗里亮起。"
      - type: "dialogue"
        speaker: "陈叔"
        content: "你公开它，雾镇就再也装不下去了。"
      - type: "dialogue"
        speaker: "林澈"
        content: "那就让它空出来。"
      - type: "transition"
        content: "清晨第一声钟响穿过雾镇。"
notes:
  adaptation_summary: "三章小说被压缩为四场短剧：旧铺发现、档案追问、钟内录音、信号室对峙。"
  omitted_elements:
    - "林澈与父亲长期疏离的更多童年回忆。"
    - "周铭被藏起后的详细去向。"
  risks:
    - "陈叔收钱动机仍需在长版本中补强。"
    - "周铭线索可在后续版本中增加回访或证言。"
  next_steps:
    - "补写陈叔与林澈父亲十年前的直接冲突闪回。"
    - "为最终公开真相增加媒体或法律后续。"
