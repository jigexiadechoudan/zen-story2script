spring:
  application:
    name: zen-story2script-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-mini}
          max-tokens: ${OPENAI_MAX_TOKENS:4096}
    vectorstore:
      type: ${SPRING_AI_VECTORSTORE_TYPE:none}
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:story2script;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

story2script:
  agent:
    autonomous-enabled: ${STORY2SCRIPT_AGENT_AUTONOMOUS_ENABLED:true}
    autonomous-timeout: ${STORY2SCRIPT_AGENT_AUTONOMOUS_TIMEOUT:45s}
    max-input-chars: ${STORY2SCRIPT_AGENT_MAX_INPUT_CHARS:12000}
  rag:
    vector-store-enabled: ${STORY2SCRIPT_RAG_VECTOR_STORE_ENABLED:false}
    sync-on-startup: ${STORY2SCRIPT_RAG_SYNC_ON_STARTUP:false}
    top-k: ${STORY2SCRIPT_RAG_TOP_K:2}
    similarity-threshold: ${STORY2SCRIPT_RAG_SIMILARITY_THRESHOLD:0.0}
  yaml:
    schema-version: "1.0"
  auth:
    cookie-name: ${AUTH_COOKIE_NAME:story2script_session}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    token-secret: ${AUTH_TOKEN_SECRET:dev-only-change-this-secret-at-least-32-chars}
    token-ttl-seconds: ${AUTH_TOKEN_TTL_SECONDS:604800}
    registration-invite-code: ${REGISTRATION_INVITE_CODE:dev-invite}
