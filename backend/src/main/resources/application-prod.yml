spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:openai}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          temperature: 0.2
          max-tokens: ${OPENAI_MAX_TOKENS:4096}
      embedding:
        base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        api-key: ${DASHSCOPE_API_KEY}
        embeddings-path: /embeddings
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
          encoding-format: float
    vectorstore:
      type: ${SPRING_AI_VECTORSTORE_TYPE:pgvector}
      pgvector:
        initialize-schema: ${PGVECTOR_INITIALIZE_SCHEMA:true}
        schema-name: ${PGVECTOR_SCHEMA_NAME:public}
        table-name: ${PGVECTOR_TABLE_NAME:vector_store}
        dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        max-document-batch-size: 1000

story2script:
  auth:
    cookie-secure: true
  ai:
    openai:
      enabled: true
  rag:
    vector-store-enabled: ${STORY2SCRIPT_RAG_VECTOR_STORE_ENABLED:true}
    sync-on-startup: ${STORY2SCRIPT_RAG_SYNC_ON_STARTUP:true}
    top-k: ${STORY2SCRIPT_RAG_TOP_K:2}
    similarity-threshold: ${STORY2SCRIPT_RAG_SIMILARITY_THRESHOLD:0.0}

logging:
  level:
    dev.zen.story2script: INFO
