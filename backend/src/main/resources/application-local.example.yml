# Local profile example for real OpenAI-compatible chat models.
#
# Usage:
# 1. Copy this file to application-local.yml.
# 2. Start the backend with SPRING_PROFILES_ACTIVE=local.
# 3. Put your real API key in application-local.yml or OPENAI_API_KEY.
#
# application-local.yml is ignored by git and may contain secrets. Do not commit it.
# Environment variables override these placeholders:
#   OPENAI_BASE_URL=https://www.yysc.top/v1
#   OPENAI_API_KEY=<your-openai-api-key>
#   OPENAI_MODEL=gpt-5.5

spring:
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      base-url: ${OPENAI_BASE_URL:https://www.yysc.top/v1}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5.5}
          temperature: 0.3

story2script:
  ai:
    openai:
      enabled: true

server:
  port: 8080
